name: Datadog-Infra-As-Code-Security
on:
  push: {}
jobs:
  infra-as-code-code-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Check imported libraries are secure and compliant
        uses: DataDog/datadog-iac-scanner-github-action@b5dc19b85ac4af53e56e02d430831fb6a87b6406
        with:
          dd_app_key: ${{ secrets.DD_APP_KEY }}
          dd_api_key: ${{ secrets.DD_API_KEY }}
          dd_site: datadoghq.eu
permissions: {}
